# Деплой production-сборки Vite SPA на GitHub Pages (project site).
# Source в Settings → Pages должен быть «GitHub Actions».
name: Deploy to GitHub Pages

on:
  push:
    branches: [chore/github-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test
        run: npm run lint && npm run typecheck && npm test

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_MOCK_AUTH_ENABLED: ${{ vars.VITE_MOCK_AUTH_ENABLED || 'true' }}
          VITE_USE_API_FIXTURES: 'true'
          VITE_ANOMALY_API_BASE_URL: ${{ vars.VITE_ANOMALY_API_BASE_URL }}

      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
